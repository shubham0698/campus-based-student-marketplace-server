<!-- add_product.html -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Product - CampusMart</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    background:linear-gradient(135deg,#f5f7fa 0%,#c3cfe2 100%);
    min-height:100vh;
    padding:20px;
}

/* Navbar */
nav{
    background:white;
    color:#2d3748;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-radius:15px;
    margin-bottom:30px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

nav .logo{
    font-size:24px;
    font-weight:700;
    color:#667eea;
}

nav .logo i{
    margin-right:8px;
}

nav a{
    color:#4a5568;
    text-decoration:none;
    margin-left:20px;
    font-weight:500;
    transition:0.3s;
}

nav a:hover{
    color:#667eea;
}

/* Container */
.container{
    max-width:800px;
    margin:0 auto;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 20px 60px rgba(0,0,0,0.1);
}

.container .header{
    text-align:center;
    margin-bottom:40px;
}

.container .header h2{
    color:#2d3748;
    font-size:28px;
    margin-bottom:10px;
    font-weight:700;
}

.container .header p{
    color:#718096;
    font-size:16px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:25px;
}

.input-group label{
    display:block;
    margin-bottom:10px;
    font-weight:600;
    color:#2d3748;
    font-size:14px;
}

.input-group input,
.input-group textarea,
.input-group select{
    width:100%;
    padding:15px 20px;
    border:2px solid #e2e8f0;
    border-radius:12px;
    font-size:16px;
    outline:none;
    transition:0.3s;
    background:#f8f9fa;
}

.input-group textarea{
    resize:vertical;
    min-height:120px;
    font-family:inherit;
}

.input-group input:focus,
.input-group textarea:focus,
.input-group select:focus{
    border-color:#667eea;
    background:white;
    box-shadow:0 0 0 3px rgba(102, 126, 234, 0.1);
}

.input-group input::placeholder,
.input-group textarea::placeholder{
    color:#a0aec0;
}

/* File input styling */
.file-input{
    position:relative;
    display:inline-block;
    width:100%;
}

.file-input input[type="file"]{
    position:absolute;
    opacity:0;
    width:100%;
    height:100%;
    cursor:pointer;
}

.file-input .file-label{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:15px 20px;
    border:2px dashed #cbd5e0;
    border-radius:12px;
    background:#f8f9fa;
    cursor:pointer;
    transition:0.3s;
    color:#718096;
}

.file-input .file-label:hover{
    border-color:#667eea;
    background:#edf2f7;
}

.file-input .file-label i{
    margin-right:10px;
    font-size:18px;
}

.btn{
    width:100%;
    padding:18px;
    border:none;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    font-size:16px;
    font-weight:600;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
}

.btn:hover{
    background:linear-gradient(135deg,#5a67d8,#6b46c1);
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(102, 126, 234, 0.3);
}

.btn i{
    margin-right:8px;
}

/* Responsive */
@media (max-width:768px){
    .form-grid{
        grid-template-columns:1fr;
        gap:20px;
    }

    .container{
        padding:30px 20px;
    }

    nav{
        padding:12px 20px;
        flex-direction:column;
        gap:15px;
    }

    nav .nav-links{
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
        gap:15px;
    }

    nav a{
        margin:0;
    }
}
</style>

</head>
<body>

<nav>
    <div class="logo"><i class="fas fa-university"></i> CampusMart</div>
    <div class="nav-links">
        <a href="/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="/products"><i class="fas fa-shopping-bag"></i> Products</a>
        <a href="/my-products"><i class="fas fa-box"></i> My Products</a>
        <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
</nav>

<div class="container">
    <div class="header">
        <h2><i class="fas fa-plus-circle"></i> Add New Product</h2>
        <p>List your item for sale in the campus marketplace</p>
    </div>

    <form action="/add-product" method="POST" enctype="multipart/form-data">
        <div class="form-grid">
            <div class="input-group">
                <label for="name">Product Name</label>
                <input type="text" id="name" name="name" placeholder="Enter product name" required>
            </div>

            <div class="input-group">
                <label for="category">Category</label>
                <select id="category" name="category" required>
                    <option value="">Select Category</option>
                    <option>📚 Books</option>
                    <option>💻 Electronics</option>
                    <option>📝 Notes</option>
                    <option>🚲 Bicycle</option>
                    <option>🪑 Furniture</option>
                    <option>🎒 Accessories</option>
                    <option>🏠 Room Items</option>
                    <option>📱 Gadgets</option>
                    <option>🎵 Music</option>
                    <option>⚽ Sports</option>
                    <option>📖 Study Materials</option>
                    <option>🛍️ Other</option>
                </select>
            </div>
        </div>

        <div class="form-grid">
            <div class="input-group">
                <label for="price">Price (₹)</label>
                <input type="number" id="price" name="price" placeholder="Enter price" min="0" step="0.01" required>
            </div>

            <div class="input-group">
                <label for="condition">Condition</label>
                <select id="condition" name="condition">
                    <option value="">Select Condition</option>
                    <option>Brand New</option>
                    <option>Like New</option>
                    <option>Good</option>
                    <option>Fair</option>
                    <option>Poor</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="Describe your product in detail (condition, features, etc.)"></textarea>
        </div>

        <div class="input-group">
            <label for="image">Product Image</label>
            <div class="file-input">
                <input type="file" id="image" name="image" accept="image/*">
                <div class="file-label">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>Click to upload image</span>
                </div>
            </div>
        </div>

        <button type="submit" class="btn">
            <i class="fas fa-paper-plane"></i> Post Product
        </button>
    </form>
</div>

<script>
// File input preview
document.getElementById('image').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const label = e.target.parentElement.querySelector('.file-label span');
        label.textContent = file.name;
    }
});
</script>

</body>
</html>
