<!-- register.html -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - CampusMart</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
    position:relative;
    overflow:hidden;
    padding:20px;
}

body::before{
    content:'';
    position:absolute;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="2" fill="white" opacity="0.05"/><circle cx="75" cy="75" r="2" fill="white" opacity="0.05"/></pattern></defs><rect width="100%" height="100%" fill="url(%23grain)"/></svg>');
}

.register-box{
    width:480px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 20px 60px rgba(0,0,0,0.2);
    position:relative;
    z-index:1;
}

.register-box .logo{
    text-align:center;
    font-size:32px;
    color:#667eea;
    margin-bottom:10px;
    font-weight:700;
}

.register-box .subtitle{
    text-align:center;
    color:#718096;
    margin-bottom:30px;
    font-size:16px;
}

.form-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-bottom:20px;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#2d3748;
    font-size:14px;
}

.input-group input,
.input-group select{
    width:100%;
    padding:15px 20px;
    border:2px solid #e2e8f0;
    border-radius:12px;
    font-size:16px;
    outline:none;
    transition:0.3s;
    background:#f8f9fa;
}

.input-group input:focus,
.input-group select:focus{
    border-color:#667eea;
    background:white;
    box-shadow:0 0 0 3px rgba(102, 126, 234, 0.1);
}

.input-group input::placeholder{
    color:#a0aec0;
}

.btn{
    width:100%;
    padding:16px;
    border:none;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    font-size:16px;
    font-weight:600;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
    margin-bottom:25px;
}

.btn:hover{
    background:linear-gradient(135deg,#5a67d8,#6b46c1);
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(102, 126, 234, 0.3);
}

.links{
    text-align:center;
    margin-bottom:20px;
}

.links a{
    text-decoration:none;
    color:#667eea;
    font-size:14px;
    font-weight:500;
    transition:0.3s;
}

.links a:hover{
    color:#5a67d8;
}

.divider{
    margin:25px 0;
    position:relative;
    color:#718096;
    font-size:14px;
}

.divider::before{
    content:'';
    position:absolute;
    top:50%;
    left:0;
    right:0;
    height:1px;
    background:#e2e8f0;
}

.divider span{
    background:white;
    padding:0 15px;
    position:relative;
    z-index:1;
}

.social-btn{
    width:100%;
    padding:12px;
    border:2px solid #e2e8f0;
    background:white;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
    margin-bottom:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    font-size:14px;
    font-weight:500;
    color:#4a5568;
}

.social-btn:hover{
    border-color:#cbd5e0;
    background:#f8f9fa;
}

.back-home{
    display:block;
    text-align:center;
    margin-top:20px;
    color:#a0aec0;
    text-decoration:none;
    font-size:14px;
    transition:0.3s;
}

.back-home:hover{
    color:#667eea;
}

/* Responsive */
@media (max-width:600px){
    .register-box{
        width:95%;
        padding:30px 20px;
    }

    .form-row{
        grid-template-columns:1fr;
        gap:0;
    }

    .register-box .logo{
        font-size:28px;
    }
}
</style>

</head>
<body>

<div class="register-box">
    <div class="logo"><i class="fas fa-university"></i> CampusMart</div>
    <div class="subtitle">Join the campus marketplace community</div>

    <form action="/register" method="POST">
        <div class="form-row">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter full name" required>
            </div>
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter college email" required>
            </div>
        </div>

        <div class="form-row">
            <div class="input-group">
                <label for="phone">Mobile Number</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter mobile number" required>
            </div>
            <div class="input-group">
                <label for="college">College Name</label>
                <input type="text" id="college" name="college" placeholder="Enter college name" required>
            </div>
        </div>

        <div class="form-row">
            <div class="input-group">
                <label for="department">Department</label>
                <select id="department" name="department" required>
                    <option value="">Select Department</option>
                    <option>Computer Science</option>
                    <option>Mechanical</option>
                    <option>Civil</option>
                    <option>Electrical</option>
                    <option>Commerce</option>
                    <option>Arts</option>
                    <option>Business</option>
                    <option>Medicine</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create password" required>
            </div>
        </div>

        <button type="submit" class="btn">Create Account</button>
    </form>

    <div class="links">
        <a href="/login">Already have an account? Sign in</a>
    </div>

    <div class="divider">
        <span>or continue with</span>
    </div>

    <button class="social-btn">
        <i class="fab fa-google"></i>
        Continue with Google
    </button>

    <button class="social-btn">
        <i class="fab fa-facebook"></i>
        Continue with Facebook
    </button>

    <a href="/" class="back-home">
        <i class="fas fa-arrow-left"></i> Back to Home
    </a>
</div>

</body>
</html>
